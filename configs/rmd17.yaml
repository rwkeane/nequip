# yamllint disable rule:line-length
# Config file for training NequIP on the revised MD17 (rMD17) dataset.
# rMD17 reference: https://figshare.com/articles/dataset/Revised_MD17_dataset_rMD17_/12672038
# The dataset will be automatically downloaded to `data_source_dir` if not already present.

# ===========
#     RUN
# ===========
run: [train, test]


# ===========
#  VARIABLES
# ===========
cutoff_radius: 4.0

num_layers: 5
l_max: 3
num_features: 64

# rMD17 molecule to train on.
# Options: aspirin, azobenzene, benzene, ethanol, malonaldehyde,
#          naphthalene, paracetamol, salicylic, toluene, uracil
rmd17_molecule: aspirin

# Directory to download/store the rMD17 dataset files
data_source_dir: ./data/rmd17

# rMD17 molecules are organic molecules containing only C, H, and O.
# (aspirin also contains O; all rMD17 molecules are C/H/O only)
model_type_names: [C, H, O]
chemical_species: ${model_type_names}

monitored_metric: val0_epoch/weighted_sum


# ============
#     DATA
# ============
data:
  _target_: nequip.data.datamodule.rMD17DataModule
  seed: 456

  # which rMD17 molecule to use
  dataset: ${rmd17_molecule}

  # directory to download the data to (or where it already lives)
  data_source_dir: ${data_source_dir}

  # train / val / test split -- integers must sum to the total dataset size (100,000),
  # or use floats that sum to 1.0, e.g. [0.8, 0.1, 0.1]
  # Common benchmark splits use 950 train / 50 val / rest test:
  train_val_test_split: [950, 50, 99000]

  transforms:
    - _target_: nequip.data.transforms.ChemicalSpeciesToAtomTypeMapper
      model_type_names: ${model_type_names}
    - _target_: nequip.data.transforms.NeighborListTransform
      r_max: ${cutoff_radius}

  train_dataloader:
    _target_: torch.utils.data.DataLoader
    batch_size: 5
    num_workers: 4
    shuffle: true
  val_dataloader:
    _target_: torch.utils.data.DataLoader
    batch_size: 5
    num_workers: ${data.train_dataloader.num_workers}
  test_dataloader: ${data.val_dataloader}

  stats_manager:
    _target_: nequip.data.CommonDataStatisticsManager
    dataloader_kwargs:
      batch_size: 5
    type_names: ${model_type_names}


# =============
#    TRAINER
# =============
trainer:
  _target_: lightning.Trainer
  accelerator: gpu
  enable_checkpointing: true
  max_epochs: 1000000
  max_time: 03:00:00:00
  log_every_n_steps: 1

  logger:
    _target_: lightning.pytorch.loggers.CSVLogger
    save_dir: ${hydra:runtime.output_dir}
    name: rmd17_${rmd17_molecule}

  callbacks:
    - _target_: lightning.pytorch.callbacks.EarlyStopping
      monitor: ${monitored_metric}
      min_delta: 1e-3
      patience: 1000

    - _target_: lightning.pytorch.callbacks.ModelCheckpoint
      monitor: ${monitored_metric}
      dirpath: ${hydra:runtime.output_dir}
      filename: best
      save_last: true

    - _target_: lightning.pytorch.callbacks.LearningRateMonitor
      logging_interval: epoch

    - _target_: nequip.train.callbacks.GPUMemoryMonitor


# =====================
#    TRAINING MODULE
# =====================
training_module:
  _target_: nequip.train.EMALightningModule
  ema_decay: 0.99

  loss:
    _target_: nequip.train.EnergyForceLoss
    per_atom_energy: true
    coeffs:
      total_energy: 1.0
      forces: 1000.0

  val_metrics:
    _target_: nequip.train.EnergyForceMetrics
    coeffs:
      total_energy_mae: 1.0
      forces_mae: 1000.0
  train_metrics: ${training_module.val_metrics}
  test_metrics: ${training_module.val_metrics}

  optimizer:
    _target_: torch.optim.Adam
    lr: 0.01
    amsgrad: true
    betas: [0.9, 0.999]
    eps: 1.0e-8
    weight_decay: 0

  lr_scheduler:
    scheduler:
      _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
      factor: 0.8
      patience: 50
      threshold: 0.2
      min_lr: 1e-6
    monitor: ${monitored_metric}
    interval: epoch
    frequency: 1

  model:
    # _target_: nequip.model.modify
    # modifiers:
    #   - modifier: enable_OpenEquivariance
    # model:
      _target_: nequip.model.NequIPGNNModel
      compile_mode: compile

      seed: 456
      model_dtype: float32
      type_names: ${model_type_names}
      r_max: ${cutoff_radius}

      num_bessels: 8
      bessel_trainable: true
      polynomial_cutoff_p: 6

      num_layers: ${num_layers}
      l_max: ${l_max}
      parity: true
      num_features: ${num_features}

      radial_mlp_depth: 3
      radial_mlp_width: 64

      avg_num_neighbors: ${training_data_stats:num_neighbors_mean}
      per_type_energy_scales: ${training_data_stats:per_type_forces_rms}
      per_type_energy_shifts: ${training_data_stats:per_atom_energy_mean}
      per_type_energy_scales_trainable: true
      per_type_energy_shifts_trainable: true
